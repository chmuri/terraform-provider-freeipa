services:
  freeipa:
    image: freeipa/freeipa-server:almalinux-10
    container_name: freeipa-test-server
    hostname: ipa.test.local
    tty: true
    stdin_open: true
    privileged: true
    cgroup: host
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.lo.disable_ipv6=0
    environment:
      - IPA_SERVER_IP=10.5.0.10
      - PASSWORD=SecretAdminPassword123!
      - CONFIGURE_LDAP=yes
      - CONFIGURE_BIND=yes
      - IPA_SERVER_INSTALL_OPTS=--skip-mem-check -U -r TEST.LOCAL -n test.local --no-ntp --no-forwarders
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - freeipa-data:/data
    healthcheck:
      test: ["CMD", "ipa", "ping"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      test_net:
        ipv4_address: 10.5.0.10


volumes:
  freeipa-data:

networks:
  test_net:
    ipam:
      driver: default
      config:
        - subnet: 10.5.0.0/16
